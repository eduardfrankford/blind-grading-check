<html lang="en">
<head>

  .verdict { font-size:16px; font-weight:700; margin-bottom:10px; }
  .verdict.ai { color:var(--ai); } .verdict.human { color:var(--human); } .verdict.tie { color:var(--tie); }

  .pill { border:1px solid var(--line); border-radius:9px; padding:8px 12px; font-size:13.5px; }
  .pill .lab { color:var(--muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; display:block; }
  .pill .val { font-size:17px; font-weight:700; }
  .pill.yours .val { color:var(--ink); } .pill.ai .val { color:var(--ai); } .pill.hum .val { color:var(--human); }
  .note { font-size:13px; color:#374151; background:#f7f8fa; border-radius:8px; padding:9px 11px; }
  .note .lab { color:var(--muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; }
  label.amb { font-size:13px; color:var(--muted); display:inline-flex; align-items:center; gap:6px; cursor:pointer; }
  .big { font-size:26px; font-weight:800; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:14px 0; }

  .statbox { border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .statbox .k { color:var(--muted); font-size:12.5px; }
  .hint { color:var(--muted); font-size:12.5px; margin-top:14px; }
  a.dl { color:var(--ai); cursor:pointer; text-decoration:underline; font-size:14px; margin-right:16px; }
  .lead p { color:#374151; } .lead li { margin:4px 0; }
  kbd { background:#eef0f3; border:1px solid var(--line); border-bottom-width:2px; border-radius:5px; padding:0 5px; font-size:12px; }

       }\n\n        auditoriumList.add(auditorium);\n    }\n\n    public void printMoviesByAuditorium(int auditoriumNumber) {\n\n        for (Auditorium auditorium : auditoriumList){\n            if(auditorium.getAuditoriumNumber() == auditoriumNumber){\n                Collection<Movie> moviesByAuditorium = auditorium.getMovieProgram();\n                for (Movie movie : moviesByAuditorium){\n                    System.out.println(movie);\n                }\n                return;\n            }\n        }\n\n        System.out.println(\"Auditorium mit AuditoriumsID: \" + auditoriumNumber + \" existier", "human": 1.0, "llm": 2.0, "llm_note": "Duplicates are skipped via addMovie\u2019s check; existing entries are not overwritten; method returns false if any duplicate.", "disagree": true}], "tasks": {"ps_exam_1_e02": {"title": "Schleifen, Bedingungen und Methoden", "text": "Ziel der Aufgabe ist es, die Atbash-Verschl\u00fcsselung zu implementieren. Bei dieser einfachen Verschl\u00fcsselung wird das Alphabet gespiegelt: A <-> Z, B <-> Y, C <-> X, .... Dabei gilt\n\n- Dasselbe gilt auch f\u00fcr Kleinbuchstaben (a <-> z, b <-> y, ...).\n\n- Alle Nicht-Buchstaben (z. B. Leerzeichen, Zahlen oder Satzzeichen) sollen unver\u00e4ndert bleiben.\n\n- Da die Atbash-Verschl\u00fcsselung ihr eigenes Inverses ist, kann dieselbe Methode sowohl zum Verschl\u00fcsseln als auch zum Entschl\u00fcsseln verwendet werden.\n\nImplementieren Sie nun die Methode\n\npublic static String atbash(String text)\n\nDie Methode soll den \u00fcbergebenen Text text zeichenweise mit der Atbash-Verschl\u00fcsselung verarbeiten und das Ergebnis als neuen String zur\u00fcckgeben. Dabei sollen alle Buchstaben durch ihren gespiegelten Buchstaben im Alphabet ersetzt werden. Gro\u00df- und Kleinschreibung der jeweiligen Buchstaben m\u00fcssen beibehalten werden. Alle Zeichen, die keine Buchstaben sind, sollen unver\u00e4ndert in das Ergebnis \u00fcbernommen werden.\n\nHint: Verwenden Sie zur Zeichenverarbeitung idealerweise String.toCharArray() sowie passende statische Methoden aus der Klasse Character, z. B. Character.isLetter() oder Character.isUpperCase().\n\nExample: F\u00fcr den Aufruf atbash(\"Hello, World!\") soll der String \" Svool, Dliow!\" zur\u00fcckgegeben werden.\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test1/e02/AtbashCipher.java"}, "ps_exam_1_e03": {"title": "Klassen und Objekte", "text": "[ht]\n\nUML-Diagramm f\u00fcr die Klassen HotelRoom und Hotel.\n\nEine Plattform f\u00fcr Hotels m\u00f6chte eine Software entwickeln, um die Verwaltung von Hotelzimmern zu erleichtern. Jedes Zimmer besitzt eine eindeutige Zimmernummer, eine Kategorie und einen Preis pro Nacht. Die L\u00f6sung soll objektorientiert umgesetzt werden und Kapselung verwenden. Das entsprechende UML-Diagramm ist in der Angabe dargestellt.\n\nTeilaufgabe HotelRoom (20 Punkte)\n\n\u00dcbersetzen Sie das UML-Diagramm in eine entsprechende Klasse HotelRoom. Zus\u00e4tzlich sollen folgende Anforderungen erf\u00fcllt werden:\n\n- Die Attribute roomNumber und roomCategory d\u00fcrfen nach der Initialisierung nicht mehr ge\u00e4ndert werden.\n\n- Implementieren Sie eine Methode, mit der der Preis pro Nacht aktualisiert werden kann. Der Preis darf jedoch nur dann ge\u00e4ndert werden, wenn der neue Preis positiv ist. Andernfalls bleibt der urspr\u00fcngliche Preis unver\u00e4ndert.\n\nTeilaufgabe Hotel (30 Punkte)\n\nImplementieren Sie die Klasse Hotel entsprechend dem UML-Diagramm unter Einhaltung folgender Anforderungen:\n\n- Der Hotelname darf nach der Initialisierung nicht mehr ge\u00e4ndert werden.\n\n- Die Zimmer sollen intern gekapselt in einer geeigneten Collection verwaltet werden.\n\n- Implementieren Sie die Methode addRoom(HotelRoom room). Es d\u00fcrfen nur g\u00fcltige Referenzen (room != null) hinzugef\u00fcgt werden, und doppelte Zimmernummern sind nicht erlaubt. Die Methode soll im Erfolgsfall true, andernfalls false zur\u00fcckgeben.\n\n- Implementieren Sie zus\u00e4tzlich eine weitere Methode mit dem exakt selben Methodennamen wie davor: addRoom (diese fehlt im UML-Diagramm!), die das Erstellen eines neuen Zimmers direkt \u00fcber die erforderlichen Attribute erm\u00f6glicht. Auch hier d\u00fcrfen nur g\u00fcltige Werte akzeptiert werden, zum Beispiel ein positiver Preis. Doppelte Zimmernummern sind ebenfalls nicht erlaubt. Die Methode soll im Erfolgsfall true, andernfalls false zur\u00fcckgeben.\n\n- Implementieren Sie die Instanzmethode getRoomCount() in der Klasse Hotel, die die Anzahl der aktuell in diesem Hotel verwalteten Zimmer zur\u00fcckgibt.\n\n- Implementieren Sie die Methode updateRoomPrice(int roomNumber, double newPrice), um den Preis eines vorhandenen Zimmers zu aktualisieren. Die Preis\u00e4nderung muss \u00fcber die entsprechende Methode der Klasse HotelRoom erfolgen. Dabei gilt: Nur positive Preise sind erlaubt. Existiert die Zimmernummer nicht oder ist der Preis ung\u00fcltig, soll false zur\u00fcckgegeben werden.\n\nErg\u00e4nzen Sie passende Getter und Setter. \u00dcberlegen Sie dabei genau, welche Methoden tats\u00e4chlich ben\u00f6tigt werden.\n\nHint: Gehen Sie davon aus, dass bei der Initialisierung nur korrekte Werte \u00fcbergeben werden.\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test1/e03/HotelRoom.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test1/e03/Hotel.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test1/e03/HotelTest.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test1/e03/RoomCategory.java"}, "ps_exam_2_e02": {"title": "Kinoprogramm mit Java Collections", "text": "Sie sollen ein vereinfachtes Verwaltungssystem f\u00fcr ein Kino implementieren.\nDas Verwaltungssystem umfasst die Klassen Cinema, Auditorium, Movie und eine Enum-Klasse Genre. \nAuf OLAT finden Sie Code Templates.\nLesen Sie sich die Anforderungen an das Verwaltungssystem zun\u00e4chst aufmerksam durch und \u00fcberlegen Sie, welche interne Datenstrukturen am besten geeignet sind. \n\nDie Klasse Movie beschreibt Filme und umfasst folgende Eigenschaften und Funktionen:\n\n- Ein Film hat mindestens die Attribute movieId, title und genre. Ein Film soll dabei einem der vorgegebenen Genres aus der Enum-Klasse Genre zugeordnet sein. \n\n- Die Methode toString soll \u00fcberschrieben werden, sodass ein String der Form [ID] title (genre1) zur\u00fcckgegeben wird. (Zum Beispiel ``[17] Titanic (DRAMA)'')\n\nFilme werden in Kinos\u00e4len (Auditorien) vorgestellt. Dabei kann derselbe Film in mehreren Auditorien gezeigt werden. \nDie Klasse Auditorium umfasst folgende Eigenschaften und Funktionen:\n\n- Ein Auditorium hat eine auditoriumNumber sowie eine Collection movieProgram die alle Filme enth\u00e4lt, die in diesem Auditorium vorgestellt werden. W\u00e4hlen Sie daf\u00fcr eine geeignete Datenstruktur, mit der sich Filme effizient anhand ihrer movieId finden lassen (z.B. Map).\n\n- Es soll m\u00f6glich sein mit einer Methode boolean addMovie(Movie movie) einen Film in das Programm aufzunehmen. Ist dies erfolgreich, soll die Methode true zur\u00fcckgeben. Falls der Film bereits im Programm ist, soll eine Warnung auf der Konsole ausgegeben werden und false zur\u00fcckgegeben werden. \n\n- Ebenso soll es mit der Methode boolean addMovies(Collection<Movie> movies) m\u00f6glich sein, mehrere Filme auf einmal in das Programm aufzunehmen. Falls einzelne Filme bereits im Programm sind, sollen diese \u00fcbersprungen und nicht erneut hinzugef\u00fcgt werden (die bereits gespeicherten Eintr\u00e4ge bleiben unver\u00e4ndert). Die Methode gibt true zur\u00fcck, wenn alle Filme erfolgreich hinzugef\u00fcgt wurden (d.h. keiner \u00fcbersprungen wurde), sonst false.\n\n- Die Klasse soll au\u00dferdem eine Methode Movie findMovieById(int movieId) bereitstellen, die einen Film zur\u00fcckgibt, wenn er im Programm des Auditoriums enthalten ist. Wenn kein Film mit der movieID im Programm existiert, soll null zur\u00fcckgegeben und eine Warnung auf der Konsole ausgegeben werden.\n\n- Wird ein Film nicht mehr gezeigt, soll er mit removeMovie(int movieId) entfernt werden k\u00f6nnen, sofern er im Programm enthalten ist. Die Methode soll true zur\u00fcckgeben, wenn der Film erfolgreich entfernt wurde (d.h. im Programm enthalten war), ansonsten false.\n\nIn der Klasse Cinema k\u00f6nnen User das Verwaltungssystem verwenden. Die Klasse umfasst eine Collection aller Auditorien in dem Kino und bietet folgende Funktionalit\u00e4ten:\n\n- User k\u00f6nnen ausgeben, welche Filme in einem gegebenen Auditorum gezeigt werden (void printMoviesByAuditorium(int auditoriumNumber)). \n\n- User k\u00f6nnen alle Filme von bestimmten Genres ausgeben (printMoviesByGenre(Genre genre)). \n\n- Bonusaufgabe (+5 Punkte): User k\u00f6nnen herausfinden, f\u00fcr welches Genre die meisten Filme im Kino gezeigt werden (void printGenreMostShown()). Gez\u00e4hlt werden Filme \u00fcber alle Auditorien, Mehrfachvorkommen z\u00e4hlen mehrfach. Den Fall, dass es mehr als ein Gewinner-Genre geben kann m\u00fcssen Sie nicht ber\u00fccksichtigen. \n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test2/e02/Genres.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test2/e02/Movie.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test2/e02/Auditorium.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test2/e02/Cinema.java\n\nSubmit file: ..."}, "ps_exam_2_e03": {"title": "Vererbung", "text": "Nun sollen Sie ein Verwaltungssystem f\u00fcr elektronische Ger\u00e4te implementieren.\nDas Programm umfasst die \u00dcberklasse Device und zwei Unterklassen: Desktop und ChargableDevice.\nDie Klasse ChargeableDevice ist eine \u00dcberklasse von Laptop und Camera.\n\nDie Klasse Device enth\u00e4lt die Basis-Eigenschaften und Funktionen von Ger\u00e4ten. Es sollen keine eigenen Instanzen der Klasse Device erstellt werden k\u00f6nnen.\n\n- Jedes Ger\u00e4t hat mindestens die Attribute int deviceId, String brand und double priceEUR.\n\n- Jedes Ger\u00e4t hat eine deviceCategory. Die verf\u00fcgbaren Kategorien sind in der Enum-Klasse DeviceCategory definiert (Camera, Laptop, und Desktop).\n\n- Ger\u00e4te haben eine Methode getDeviceCategory(), welche die Kategorie des Ger\u00e4ts zur\u00fcckgibt. Jede Unterklasse von Device muss diese Methode implementieren und die entsprechende Kategorie zur\u00fcckgeben.\n\n- Ger\u00e4te haben eine Methode getInfo(), welche einen String in folgender Form ausgibt: ''The [DeviceCategory] [deviceId] from [brand] costs [priceEUR] Euro.\" (Zum Beispiel ``The LAPTOP 1 from Lenovo costs 430.00 Euro.'').\n\nManche Ger\u00e4te sind aufladbar (chargeable).\nDiese erben Eigenschaften und Ladeverhalten von der Klasse ChargeableDevice. Auch hier soll es keine eigenen Instanzen von ChargeableDevice geben.\n\n- Aufladbare Ger\u00e4te haben einen Akkustand (float batteryLevelPercent) der in Prozent (von 0 bis 100\\%) angegeben wird.\n\n- Sie haben ein Attribut int minutesUntilCharged, welches angibt, wieviele Minuten das Ger\u00e4t geladen werden muss, damit es voll ist, wenn der Akkustand vorher 0\\% war. Dieses Attribut wird im Konstruktor des jeweiligen Objektes angegeben.\n\n- Eine abstrakte Methode isBatteryLevelLow() gibt true zur\u00fcck wenn der Akku unter einem bestimmten Limit ist. \n\n- Aufladbare Ger\u00e4te k\u00f6nnen f\u00fcr eine gegebene Anzahl an Minuten aufgeladen werden (charge(int minutes)). Eine Minute aufladen erh\u00f6ht den Akkustand um 100minutesUntilCharged. Verwenden Sie folgende Formel: \n\nbatteryLevelPercent += minutes * (100.0f / minutesUntilCharged).\n\nDer Akku kann auf maximal 100\\% geladen werden. Einfachheitshalber nehmen wir an, dass wir unsere Ger\u00e4te gerade nicht verwenden und sich ihr Akkustand daher nicht von selbst entleert.\n\nZu den aufladbaren Ger\u00e4ten z\u00e4hlen Camera und Laptop.\nDesktop PCs sind nicht aufladbar.\n\n- \u00dcberschreiben Sie die isBatteryLevelLow() Methode f\u00fcr die Klassen Camera und Laptop. Kameras gelten als fast leer, wenn der Akku unter (<) 15\\% ist. Laptops gelten als fast leer, wenn der Akku unter (<) 10\\% ist.\n\n- Kameras haben zus\u00e4tzlich noch das Attribut int megapixel. Erg\u00e4nzen Sie die getInfo() Methode mit der Information \u00fcber die Megapixel (``... Euro. It has 32 MP.''). \n\n- Die Klassen Laptop und Desktop haben zus\u00e4tzlich noch das Attibut String operatingSystem. Erg\u00e4nzen Sie die getInfo() Methode mit der Information \u00fcber das Betriebssystem. (``... Euro. It uses the Linux operating system.''). \n\nDie Klasse Inventory, welche die Ger\u00e4te verwaltet, wird Ihnen bereitgestellt. Damit k\u00f6nnen Sie ihre Implementierung testen. Sie brauchen darin nichts zu implementieren. \n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test2/e03/Device.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test2/e03/Desktop.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test2/e03/ChargeableDevice.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test2/e03/Camera.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test2/e03/Laptop.java\n\nSubmit file: ..."}, "ps_exam_3_e02": {"title": "PodcastLibrary mit Generics, Exceptions und JUnit", "text": "Gegeben sei ein Record Podcast mit Attributen wie Titel, Host oder Laufzeit (siehe Template).\nIn dieser Aufgabe sollen Sie in der Klasse PodcastLibrary verschiedene Sortier- und Suchoperationen implementieren. Alle Operationen basieren dabei auf der Liste podcasts, die in der main-Methode bereits mit Beispielwerten bef\u00fcllt wird.\n\nSie k\u00f6nnen in den folgenden Unteraufgaben davon ausgehen, dass die Liste nicht null ist und mindestens einen Podcast enth\u00e4lt.\nBeachten Sie, dass f\u00fcr die Implementierungen von Vergleichsoperationen keine weiteren Klassen erstellt werden d\u00fcrfen.\n\n- Podcast soll das Interface Comparable implementieren, sodass die nat\u00fcrliche Ordnung der Objekte der Klasse Podcast als aufsteigend nach Titel (alphabetisch) definiert ist. (2 Punkte)\n\n- List<Podcast> sortedByDuration() \n\nGibt eine neue Liste aller Podcasts zur\u00fcck, aufsteigend nach Laufzeit (durationMinutes) sortiert. Die urspr\u00fcngliche Liste podcasts darf dabei nicht ver\u00e4ndert werden. (2 Punkte)\n\n- List<Podcast> sortedByRatingDesc() \n\nGibt eine neue Liste aller Podcasts zur\u00fcck, sortiert absteigend nach Bewertung (rating) und bei gleicher Bewertung aufsteigend nach Titel. Die urspr\u00fcngliche Liste podcasts darf dabei nicht ver\u00e4ndert werden. (4 Punkte)\n\n- Implementieren Sie eine statische generische Methode List<T> getTopN(List<T> list, int n).\nDiese nimmt eine Liste list und eine Anzahl n entgegen und gibt die top n Elemente der Liste sortiert gem\u00e4\u00df deren nat\u00fcrlicher Ordnung zur\u00fcck. \nDie Methode soll einen Typebound T definieren, der verlangt, dass Elemente vom Typ T das Interface Comparable implementieren. \n\nSollen mehr Elemente zur\u00fcckgegeben werden als die Liste lang ist, (n > list.size()), gibt die Methode alle Elemente der Liste (ebenfalls sortiert) zur\u00fcck.\nIst size kleiner als 0, soll eine \nIllegalArgumentException geworfen werden. \nDie urspr\u00fcngliche Liste list darf generell nicht ver\u00e4ndert werden. (6 Punkte)\n\n- Podcast findByTitleOrHost(String query) \n\nGibt den ersten Podcast zur\u00fcck, dessen Titel dem gegebenen Suchstring query entspricht. Gibt es keinen solchen Podcast, wird stattdessen nach einem Host gesucht, dessen Name dem query-String entspricht. Sollte es dabei mehrere Treffer geben wird der Podcast zur\u00fcckgegeben, dessen Titel alphabetisch zuerst kommt.\n\nIst der \u00fcbergebene Parameter query null oder leer, soll die Methode eine benutzerdefinierte UnknownQueryException werfen. Diese Exception soll unchecked sein.\nWenn kein Podcast existiert, dessen Titel oder Host dem query-String entspricht, so soll eine benutzerdefinierte PodcastNotFoundException Exception geworfen werden. Diese Exception soll checked sein.\n\nVerwenden Sie jeweils sinnvolle, kurze Fehlermeldungen und erweitern Sie die main Methode um einen Methodenaufruf von findByTitleOrHost der geeignet mit diesen Exceptions umgeht (kein generisches catch-all!). (6 Punkte)\n\nUnit Tests\n\nErstellen Sie die Testklasse PodcastLibraryTest und definieren Sie darin Unit-Tests f\u00fcr die Methoden getTopN und findByTitleOrHost.\nSorgen Sie geeignet daf\u00fcr, dass jedem Test dieselbe Liste an Podcasts zur Verf\u00fcgung steht (2 Punkte).\n\nSchreiben Sie jeweils Testf\u00e4lle f\u00fcr die folgenden Szenarien (falls auf die jeweilige Methode anwendbar): (8 Punkte)\n\n- G\u00fcltige Eingaben mit erwarteten Ergebnissen (mindestens zwei Testf\u00e4lle).\n\n- G\u00fcltige Eingaben, die dennoch zu Exceptions f\u00fchren (mindestens ein Test je erwarteter Exception).\n\n- Ung\u00fcltige Eingaben (mindestens ein Test)\n\nHint: Sie k\u00f6nnen die Tests auch schreiben, wenn Sie die genannten Methoden in der vorigen Aufgabe nicht (vollst\u00e4ndig) gel\u00f6st haben.\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test3/e02/Podcast.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test3/e02/PodcastLibrary.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test3/e02/UnknownQueryException.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test3/e02/PodcastNotFoundException.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test3/e02/PodcastLibraryTest.java"}, "ps_exam_3_e03": {"title": "Generics", "text": "In dieser Aufgabe wird das Zusammenspiel zwischen Datenproduzenten und -empf\u00e4ngern skizziert. Daf\u00fcr sind die folgenden generischen Interfaces gegeben:\n\n- DataProducer: produziert Daten des Typs T f\u00fcr bestimmte Themen (topic). Interessierte Empf\u00e4nger (DataReceiver) k\u00f6nnen sich dabei f\u00fcr ausgew\u00e4hlte Themen registrieren und werden bei neuen Daten entsprechend benachrichtigt.\n\n- DataReceiver: kann neue Daten des Typs T empfangen und stellt zus\u00e4tzliche statistische Methoden bereit (z.B. Anzahl an erhaltenen Daten).\n\nIm Folgenden sollen Sie jeweils zwei Standardimplementierungen der Interfaces erstellen. Eine \u00dcbersicht \u00fcber alle in dieser Aufgabe verwendeten Komponenten sehen Sie im folgenden UML-Diagramm:\n\nIm Folgenden werden die Details f\u00fcr die Implementierungen in mehreren Teilaufgaben beschrieben. Sie k\u00f6nnen diesen schrittweise folgen.\n\nTeilaufgabe DataReceiver, Teil 1 (7 Punkte)\n\nErstellen Sie die Klasse StandardDataReceiver, welche das generische Interface DataReceiver<T> wie folgt implementiert:\n\n- Speichern Sie den Namen des Empf\u00e4ngers, welcher \u00fcber den Konstruktor \u00fcbergeben werden soll. \n\n- receive(): empf\u00e4ngt den Wert value zum Thema topic vom Produzenten sender. Vorerst soll hier einfach eine Nachricht in folgender Form auf der Konsole ausgeben werden:\n\n\"[<Name>] received update from [<sender>] on topic '<topic>': <value>\" \n\n(siehe Kommentar im Template)\n\n- Erstellen Sie f\u00fcr getReceivedDataCount() sowie getReceivedDataBefore() vorerst Dummy-Implementierungen, sodass Ihre Klasse kompiliert. Diese werden in Teil 2 erarbeitet.\n\nTeilaufgabe DataProducer (22 Punkte)\n\nErstellen Sie die Klasse StandardDataProducer, welche das generische Interface DataProducer<T> wie folgt implementiert:\n\n- getName(): liefert den Namen des Produzenten, welcher \u00fcber den Konstruktor \u00fcbergeben wurde.\n\n- register(): registriert den gegebenen Empf\u00e4nger receiver f\u00fcr das Thema topic. D.h. Sie m\u00fcssen sich merken, dass sich der Empf\u00e4nger f\u00fcr dieses Thema interessiert. Verwenden Sie daf\u00fcr eine Map mit den Themen als Key und einer passenden Collection f\u00fcr die Empf\u00e4nger. Stellen Sie sicher, dass sich ein Empf\u00e4nger nicht mehrfach f\u00fcr ein Thema registrieren kann (Empf\u00e4nger werden \u00fcber ihre Objektreferenz verglichen und nicht \u00fcber ihren Namen).\n\n- deregister(): falls der Empf\u00e4nger receiver registriert ist, wird die Registrierung r\u00fcckg\u00e4ngig gemacht (d.h. aus der Map entfernt).\n\n- startProducing(): informiert f\u00fcr jeden Wert aus values alle f\u00fcr das Thema topic registrierten Empf\u00e4nger \u00fcber deren Methode receive(). Z.B. wenn values 4 Werte enth\u00e4lt, dann sollen nacheinander 4 Nachrichten an alle relevanten Empf\u00e4nger gesendet werden. Warten Sie nach jedem Wert, nachdem dieser an alle interessierten Empf\u00e4nger verteilt wurde, jeweils 250ms (PRODUCING_GAP_MILLIS). Verwenden Sie daf\u00fcr Thread.sleep() und behandeln Sie dessen m\u00f6gliche Exception direkt in der Methode (im Fehlerfall ist nichts zu tun).\n\nExample: \nAngenommen, receiver1 und receiver2 sind f\u00fcr das Thema \"numbers\" bei einem DataProducer<Integer> registriert. Dann w\u00fcrde ein Aufruf von startProducing(\"numbers\", List.of(7, 1, 13)) exemplarisch wie folgt aussehen: \n\n- Sende Wert 7 an receiver1\n\n- Sende Wert 7 an receiver2\n\n- Warte 250ms\n\n- Sende Wert 1 an receiver1\n\n- Sende Wert 1 an receiver2\n\n- Warte 250ms\n\n- Sende Wert 13 an receiver1\n\n- Sende Wert 13 an receiver2\n\n- Warte 250ms\n\nDie Reihenfolge, in welcher die Empf\u00e4nger benachrichtigt werden, spielt keine Rolle. D.h. Sie k\u00f6nnen gerne Collections verwenden, die eine nicht deterministische Iteration verwenden.\n\nTeilaufgabe StandardDataReceiver, Teil 2 (11 + 5 Punkte)\n\nVervollst\u00e4ndigen Sie die Klasse StandardDataReceiver, indem die vorher angelegten Dummy- Implementierungen entsprechend ausgetauscht werden:\n\n- Bei jedem Empfang eines Werts \u00fcber receive() soll dieser zusammen mit der Empfangszeit gespeichert werden. \n\n- Verwenden Sie den gegebenen Record TimedData, der einen Wert des Typs T zusammen mit der Empfangszeit (Instant) speichern kann.\n\n- Speichern Sie \u00fcber receive() erhaltene Daten in einer Map mit dem Thema als Key und einer Liste der empfangenen TimedData als Value. Verwenden Sie dabei f\u00fcr die aktuelle Zeit Instant.now().\n\n- getReceivedDataCount(): Gibt die Anzahl der erhaltenen Daten zum Thema topic zur\u00fcck.\n\n- Bonusaufgabe (5 Punkte) getReceivedDataBefore(): Gibt alle Daten aller Themen zur\u00fcck, die vor dem gegebenen Zeitpunkt erhalten wurden. Geben Sie eine Collection zur\u00fcck, die nicht ver\u00e4ndert werden darf. Wurden keine Daten erhalten, so wird eine leere Collection zur\u00fcckgegeben.\nHinweis: Sie k\u00f6nnen zum Vergleich von Zeitpunkten die Methode isBefore() von Instant verwenden.\n\nHint: Verwenden Sie zum Testen Ihrer Implementierung die bereitgestellte Klasse MainApplication. Um die Ausf\u00fchrung zu Beschleunigen, k\u00f6nnen Sie die Wartezeit PRODUCING_GAP_MILLIS aus StandardDataProducer gerne reduzieren (der Wert wird nicht bewertet).\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test3/e03/DataProducer.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test3/e03/DataReceiver.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test3/e03/MainApplication.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test3/e03/StandardDataProducer.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test3/e03/StandardDataReceiver.java\n\nSubmit file: at/ac/uibk/pm/gXX/zidUsername/test3/e03/TimedData.java"}}, "rubrics": {"ps_exam_1_e02": [{"id": "atbash_1", "category": "API Compliance", "criterion": "Class and Method Presence", "points": 1.0}, {"id": "atbash_2", "category": "API Compliance", "criterion": "Exact Method Signature", "points": 2.0}, {"id": "atbash_3", "category": "Functional Behavior", "criterion": "Return Value", "points": 1.0}, {"id": "atbash_4", "category": "Functional Behavior", "criterion": "Positional Character Processing", "points": 1.0}, {"id": "atbash_5", "category": "Functional Correctness", "criterion": "Letter Classification", "points": 2.0}, {"id": "atbash_6", "category": "Functional Correctness", "criterion": "Uppercase Atbash Transformation", "points": 1.0}, {"id": "atbash_7", "category": "Functional Correctness", "criterion": "Lowercase Atbash Transformation", "points": 1.0}, {"id": "atbash_8", "category": "Functional Correctness", "criterion": "Preservation of Non-Letters", "points": 1.  "startProducing()", "criterion": "Innerer Loop:\u00a0Jeder\u00a0registrierte Receiver des Topics erh\u00e4lt den aktuellen Wert.", "points": 2.0}, {"id": "standarddataproducer_21", "category": "startProducing()", "criterion": "Thread.sleep\u00a0wird\u00a0nach\u00a0der Benachrichtigung aller Receiver pro Wert aufgerufen.", "points": 2.0}, {"id": "standarddataproducer_22", "category": "startProducing()", "criterion": "InterruptedException\u00a0(oder generell Exception) von Thread.sleep wird korrekt gefangen.", "points": 2.0}, {"id": "standarddatareceiver_23", "category": "getReceivedDataBefore()", "criterion": "Korrekte Filter-Logik: Alle Eintr\u00e4ge aller Topics werden gepr\u00fcft.", "points": 2.0}, {"id": "standarddatareceiver_24", "category": "getReceivedDataBefore()", "criterion": "Vergleich findet korrekt mittels\u00a0isBefore(maxDate)\u00a0statt.", "points": 2.0}, {"id": "standarddatareceiver_25", "category": "getReceivedDataBefore()", "criterion": "R\u00fcckgabe einer Collection, die nicht ver\u00e4ndert werden darf.", "points": 1.0}, {"id": "general_26", "category": "", "criterion": "StandardDataProducer and StandardDataReceiver do compile again with minor changes by teacher (otherwise all points to zero)", "points": -5.0}]}}</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const CASES = DATA.cases;
const TASKS = DATA.tasks || {};
const RUBRICS = DATA.rubrics || {};
const LS = 'blindgrade_v2';
const app = document.getElementById('app'), chip = document.getElementById('chip'), prog = document.getElementById('prog');
const fmt = v => (Number.isInteger(v) ? String(v) : v.toFixed(1));
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function shuffle(n){ const a=[...Array(n).keys()]; for(let i=n-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function load(){ try { return JSON.parse(localStorage.getItem(LS)); } catch(e){ return null; } }
function save(){ localStorage.setItem(LS, JSON.stringify(S)); }
function fresh(){ S = { order: shuffle(CASES.length), pos:0, results:[], started:false, sel:null, revealed:false }; save(); }

let S = load();
if(!S || !S.order || S.order.length !== CASES.length){ fresh(); }

function tally(){
  const dis = S.results.filter(r=>r.disagree);
  return { ai:dis.filter(r=>r.closer==='llm').length, human:dis.filter(r=>r.closer==='human').length,
           tie:dis.filter(r=>r.closer==='tie').length, disN:dis.length };
}
function paintChrome(){
  const t = tally();
  chip.innerHTML = `you side with <b class="ai">AI ${t.ai}</b> &middot; <b class="human">human ${t.human}</b>` + (t.tie?` &middot; tie ${t.tie}`:``);
  prog.style.width = (100*S.pos/CASES.length).toFixed(1)+'%';
}
function render(){
  paintChrome();
  if(!S.started) return intro();
  if(S.pos >= S.order.length) return summary();
  caseView();
}
function intro(){
  app.innerHTML = `<div class="card lead">
    <div class="crit">What this is</div>
    <p>You will see ${CASES.length} real exam grading decisions. For each one you see the <b>criterion</b> and the student's <b>code</b>, but <b>not</b> any existing grade. You assign the score you think is right.</p>
    <p>Only after you commit do we reveal two existing grades for that criterion: the <b>official human grade</b> and the <b>LLM grade</b>. We record which one your score is closer to. At the end you see whether you agreed more with the human key or with the LLM.</p>
    <ul><li>Grades are anonymous. No student or grader names are shown.</li>
    <li>The two grades are hidden until you decide, so your judgment is unbiased.</li>
    <li>You can stop anytime and download your results.</li></ul>
    <div class="actions"><button class="btn primary" onclick="start()">Start grading</button></div>
  </div>`;
}
function start(){ S.started=true; save(); render(); }

function caseView(){
  const c = CASES[S.order[S.pos]];
  const key = c.exam + '_' + c.ex;
  const task = TASKS[key]; const rub = RUBRICS[key] || [];
  const step = c.half ? 0.5 : 1;
  let opts=[]; for(let v=0; v<=c.max+1e-9; v+=step) opts.push(Math.round(v*2)/2);
  const btns = opts.map(v=>`<button data-v="${v}" onclick="pick(${v})">${fmt(v)}</button>`).join('');
  const taskHtml = task ? `<details class="ctx" open><summary>Exercise task: ${esc(task.title)}</summary>
    <div class="ctxbody">${esc(task.text).replace(/\n/g,'<br>')}</div></details>` : '';
  const rubHtml = rub.length ? `<details class="ctx"><summary>All ${rub.length} criteria for this exercise (this one in bold)</summary>
    <ol class="rublist">${rub.map(r=>`<li class="${r.id===c.crit_id?'cur':''}">${r.criterion?esc(r.criterion):'(general / overall)'}${r.category?` <em>${esc(r.category)}</em>`:''} <span>${fmt(r.points)} pt</span></li>`).join('')}</ol></details>` : '';
  app.innerHTML = `<div class="card">
    <div class="meta"><span>${esc(c.topic)}</span><span>${esc(c.student_label)}</span><span>case ${S.pos+1} of ${CASES.length}</span></div>
    ${taskHtml}
    ${c.category?`<div class="cat">${esc(c.category)}</div>`:''}
    <div class="crit">${esc(c.criterion)}</div>
    <div class="maxp">Maximum for this criterion: <b>${fmt(c.max)}</b> point${c.max===1?'':'s'}</div>
    <pre class="code">${esc(c.code)}</pre>
    ${rubHtml}
    <div class="ask">What score would you give this submission on this criterion?</div>
    <div class="grades" id="grades">${btns}</div>
    <div class="actions"><button class="btn primary" id="revealBtn" disabled onclick="reveal()">Reveal &amp; record</button>
      <span class="sub" id="selnote"></span></div>
    <div id="rev"></div>
  </div>`;
  S.sel=null; S.revealed=false;
}
function pick(v){
  if(S.revealed) return;
  S.sel=v;
  document.querySelectorAll('#grades button').forEach(b=>b.classList.toggle('sel', Number(b.dataset.v)===v));
  document.getElementById('revealBtn').disabled=false;
  document.getElementById('selnote').textContent = 'your score: '+fmt(v);
}
function reveal(){
  if(S.sel===null || S.revealed) return;
  const c = CASES[S.order[S.pos]];
  const dH=Math.abs(S.sel-c.human), dL=Math.abs(S.sel-c.llm);
  const closer = dL<dH ? 'llm' : (dH<dL ? 'human' : 'tie');
  S.revealed=true;
  document.querySelectorAll('#grades button').forEach(b=>b.disabled=true);
  document.getElementById('revealBtn').style.display='none';
  const vtxt = !c.disagree ? 'The human and the AI gave the same score here.'
      : closer==='llm' ? 'You agreed more with the <b>AI</b> grader.'
      : closer==='human' ? 'You agreed more with the <b>human</b> key.'
      : 'You landed exactly between them.';
  const vcls = !c.disagree ? 'tie' : closer==='llm' ? 'ai' : closer==='human' ? 'human' : 'tie';
  document.getElementById('rev').innerHTML = `<div class="reveal">
    <div class="verdict ${vcls}">${vtxt}</div>
    <div class="grow">
      <div class="pill yours"><span class="lab">your score</span><span class="val">${fmt(S.sel)}</span></div>
      <div class="pill hum"><span class="lab">official human</span><span class="val">${fmt(c.human)}</span></div>
      <div class="pill ai"><span class="lab">LLM</span><span class="val">${fmt(c.llm)}</span></div>
    </div>
    ${c.llm_note?`<div class="note"><span class="lab">LLM rationale</span><br>${esc(c.llm_note)}</div>`:''}
    <div class="actions">
      <button class="btn primary" onclick="next()">Next case &rarr;</button>
      <label class="amb"><input type="checkbox" id="amb"> mark this criterion as ambiguous</label>
    </div></div>`;
  S.results.push({ id:c.id, exam:c.exam, ex:c.ex, student:c.student, criterion:c.criterion,
                   max:c.max, user:S.sel, human:c.human, llm:c.llm, disagree:c.disagree, closer, ambiguous:false });
  save(); paintChrome();
}
function next(){
  const amb=document.getElementById('amb'); if(amb && S.results.length) S.results[S.results.length-1].ambiguous=amb.checked;
  S.pos++; S.sel=null; S.revealed=false; save(); render();
}

function summary(){
  const t=tally(); const r=S.results;
  const ctrl=r.filter(x=>!x.disagree); const matched=ctrl.filter(x=>Math.abs(x.user-x.human)<1e-9).length;
  const pct=(a,b)=> b? Math.round(100*a/b)+'%':'0%';
  const lead = t.disN===0 ? 'No disagreement cases graded yet.'
    : t.ai>t.human ? `You agreed more with the <span style="color:var(--ai)">AI grader</span>.`
    : t.human>t.ai ? `You agreed more with the <span style="color:var(--human)">human key</span>.`
    : `You split evenly between the AI and the human.`;
  app.innerHTML = `<div class="card">
    <div class="crit">Your results</div>
    <p class="big">${lead}</p>
    <p>On the <b>${t.disN}</b> cases where the human key and the LLM disagreed, your independent score was closer to:</p>
    <div class="row2">
      <div class="statbox"><div class="k">the LLM (AI)</div><div class="big" style="color:var(--ai)">${t.ai} <span style="font-size:15px;color:var(--muted)">(${pct(t.ai,t.disN)})</span></div></div>
      <div class="statbox"><div class="k">the human key</div><div class="big" style="color:var(--human)">${t.human} <span style="font-size:15px;color:var(--muted)">(${pct(t.human,t.disN)})</span></div></div>
    </div>
    <p class="sub">${t.tie} tie(s). Control check: on ${ctrl.length} cases where the human and AI already agreed, you matched their shared score ${matched}/${ctrl.length} times (${pct(matched,ctrl.length)}).</p>
    <div class="actions" style="margin-top:18px">
      <a class="dl" onclick="dl('json')">Download results (JSON)</a>
      <a class="dl" onclick="dl('csv')">Download results (CSV)</a>
      <button class="btn ghost" onclick="if(confirm('Erase your answers and start over?')){fresh();render();}">Restart</button>
    </div>
    <p class="hint">Your blind choices are a human check on the RQ4 audit. Send the downloaded file back to fold into the validation.</p>
  </div>`;
}
function dl(kind){
  let blob, name;
  if(kind==='json'){ blob=JSON.stringify(S.results,null,1); name='blind_grading_results.json'; }
  else { const h=['id','exam','ex','student','criterion','max','user','human','llm','disagree','closer','ambiguous'];
    const q=s=>'"'+String(s).replace(/"/g,'""')+'"';
    blob=[h.join(',')].concat(S.results.map(r=>h.map(k=>q(r[k])).join(','))).join('\n'); name='blind_grading_results.csv'; }
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([blob],{type:'text/plain'})); a.download=name; a.click();
}

document.addEventListener('keydown', e=>{
  if(!S.started || S.pos>=S.order.length) return;
  if(e.key==='Enter'){ if(S.revealed) next(); else if(S.sel!==null) reveal(); return; }
  if(/^[0-9]$/.test(e.key) && !S.revealed){
    const c=CASES[S.order[S.pos]]; const v=Number(e.key);
    if(v<=c.max+1e-9 && (c.half || Number.isInteger(v))) pick(v);
  }
});
render();
</script>
</body>
</html>
